# Lefthook pre-commit baseline for the Bookmark AI Extension.
#
# Mirrors the root package scripts so contributors run the same checks locally
# as the documented `just validate` baseline. Hooks call the stable package
# scripts (`bun run typecheck`, `bun run test`) instead of duplicating their
# internals.
#
# `bun run check` is `typecheck && test`, so invoking `check` here in addition
# to `typecheck`/`test` would run tsc and Vitest twice. To keep one stable
# command surface without duplicated concurrent validations, the hook runs
# typecheck then test sequentially (parallel: false).
#
# The extension build is intentionally excluded from the pre-commit hook: it
# requires VITE_GOOGLE_OAUTH_CLIENT_ID and would block commits when unset. The
# build is covered by `just validate` instead.
pre-commit:
  parallel: false
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun run test
