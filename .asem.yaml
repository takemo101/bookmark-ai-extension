workspace:
  id: bookmark-ai-extension
mux:
  default: herdr
  templates:
    herdr:
      create:
        - type: run
          command: 'printf ''%s'' "${HERDR_SESSION:-default}"'
          capture:
            - name: herdr_session
              regex: "^(.+)$"
              group: 1
        - type: run
          command: >-
            herdr --session {{herdr_session_shell}} workspace create
            --cwd {{cwd_shell}} --label {{session_id_shell}}
          capture:
            - name: pane_id
              jsonpath: "$.result.root_pane.pane_id"
            - name: tab_id
              jsonpath: "$.result.tab.tab_id"
            - name: herdr_workspace_id
              jsonpath: "$.result.workspace.workspace_id"
      run_in_pane:
        - type: run
          command: >-
            herdr --session {{herdr_session_shell}} pane run
            {{pane_id_shell}} {{launch_cmd_shell}}
      send:
        - type: run
          command: >-
            herdr --session {{herdr_session_shell}} agent wait
            {{pane_id_shell}} --status idle --timeout 30000
          on_error: ignore
        - type: run
          command: >-
            herdr --session {{herdr_session_shell}} agent send
            {{pane_id_shell}} {{message_shell}}
        - type: run
          command: >-
            herdr --session {{herdr_session_shell}} pane send-keys
            {{pane_id_shell}} Enter
      peek:
        - type: run
          command: >-
            herdr --session {{herdr_session_shell}} pane read
            {{pane_id_shell}} --source {{peek_source_shell}} --lines
            {{peek_lines_shell}}
      attach:
        - type: run
          command: >-
            herdr --session {{herdr_session_shell}} workspace focus
            {{herdr_workspace_id_shell}} >/dev/null && herdr --session
            {{herdr_session_shell}} tab focus {{tab_id_shell}} >/dev/null
            && if [ "${HERDR_ENV:-}" = '1' ]; then :; else exec herdr
            session attach {{herdr_session_shell}}; fi
      attach_command:
        - sh
        - -c
        - >-
          herdr --session {{herdr_session_shell}} workspace focus
          {{herdr_workspace_id_shell}} >/dev/null && herdr --session
          {{herdr_session_shell}} tab focus {{tab_id_shell}} >/dev/null
          && if [ "${HERDR_ENV:-}" = '1' ]; then :; else exec herdr
          session attach {{herdr_session_shell}}; fi
      close:
        - type: run
          command: >-
            herdr --session {{herdr_session_shell}} workspace close
            {{herdr_workspace_id_shell}}
    rmux:
      create:
        - type: run
          command: >-
            rmux new-session -d -s {{session_id_shell}}
            -c {{cwd_shell}}
        - type: run
          command: "rmux list-panes -t {{session_id_shell}} -F '#{pane_id}'"
          capture:
            - name: pane_id
              regex: "^(\\S+)\\s*$"
              group: 1
      run_in_pane:
        - type: run
          command: >-
            rmux send-keys -t {{rmux_session_name_shell}}
            -l {{launch_cmd_shell}}
        - type: wait_ms
          ms: 200
        - type: run
          command: "rmux send-keys -t {{rmux_session_name_shell}} Enter"
      send:
        - type: run
          command: >-
            rmux send-keys -t {{rmux_session_name_shell}}
            -l {{message_shell}}
        - type: wait_ms
          ms: 200
        - type: run
          command: "rmux send-keys -t {{rmux_session_name_shell}} Enter"
      peek:
        - type: run
          command: >-
            case {{peek_source_shell}} in visible) rmux capture-pane -p -t
            {{rmux_session_name_shell}} ;; recent) rmux capture-pane -p -S
            -{{peek_lines_shell}} -t {{rmux_session_name_shell}} ;;
            recent-unwrapped) rmux capture-pane -J -p -S -{{peek_lines_shell}}
            -t {{rmux_session_name_shell}} ;; *) printf '%s\n' 'unsupported
            source' >&2; exit 42 ;; esac
      attach:
        - type: run
          command: "rmux attach-session -t {{rmux_session_name_shell}}"
      attach_command:
        - rmux
        - attach-session
        - -t
        - "{{rmux_session_name}}"
      close:
        - type: run
          command: "rmux kill-session -t {{rmux_session_name_shell}}"
      refs:
        rmux_session_name: "{{session_id}}"
agent:
  default: claude
  templates:
    agy:
      command: "agy -i {{prompt_shell}}"
    claude:
      command: "claude --dangerously-skip-permissions {{model_shell}} {{prompt_shell}}"
      model_flag: --model
    kimi:
      command: "kimi --yolo {{model_shell}}"
      model_flag: -m
      paste_prompt: true
      before_paste:
        - type: wait_ms
          ms: 2000
    opencode:
      command: "opencode {{model_shell}} --prompt {{prompt_shell}}"
      model_flag: --model
    pi:
      command: "pi {{model_shell}} {{prompt_shell}}"
      model_flag: --model
