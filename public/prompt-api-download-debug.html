<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt API Download Debug</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        margin: 24px;
        max-width: 900px;
        color: #2f271f;
        background: #faf6ee;
      }
      button {
        font: inherit;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #8b6f47;
        background: #8b5e2b;
        color: white;
        cursor: pointer;
      }
      pre {
        white-space: pre-wrap;
        background: #fffaf0;
        border: 1px solid #e1d4bf;
        border-radius: 8px;
        padding: 12px;
        min-height: 260px;
      }
    </style>
  </head>
  <body>
    <h1>Prompt API Download Debug</h1>
    <p>
      このページは Prompt API の availability / create monitor /
      downloadprogress だけを確認します。ページ本文、Drive データ、OAuth
      token、storage は読みません。
    </p>
    <p>
      拡張IDが <code>abcdefgh...</code> の場合、このページは
      <code>chrome-extension://abcdefgh.../prompt-api-download-debug.html</code>
      で開けます。
    </p>
    <button id="run">Run Prompt API download debug</button>
    <pre id="output">Click the button to start.</pre>
    <script src="./prompt-api-download-debug.js"></script>
  </body>
</html>
